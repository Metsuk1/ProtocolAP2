name: Generate gRPC Code

on:
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Protorepo
        uses: actions/checkout@v3

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Code
        run: |
          mkdir -p gen/go
          protoc --go_out=gen/go --go_opt=paths=source_relative \
                 --go-grpc_out=gen/go --go-grpc_opt=paths=source_relative \
                 *.proto

      - name: Push to Generated Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Metsuk1/AP2_Generated.git target_repo
          
          mkdir -p target_repo/order target_repo/payment
          
          cp gen/go/order.pb.go gen/go/order_grpc.pb.go target_repo/order/ 2>/dev/null || true
          cp gen/go/payment.pb.go gen/go/payment_grpc.pb.go target_repo/payment/ 2>/dev/null || true
          
          cd target_repo
          rm -f *.pb.go 
          
          git add .
          git commit -m "Organize generated code into packages" || echo "No changes"
          git push origin HEAD:main